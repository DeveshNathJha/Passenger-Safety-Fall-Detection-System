# ============================================================
# Passenger Fall Detection System – Central Configuration
# ============================================================

data:
  dataset_id: "kmknation/mobifall-dataset-v20"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  processed_X: "data/processed/X_windows.npy"
  processed_y: "data/processed/y_labels.npy"
  processed_subjects: "data/processed/subjects.npy"
  # MobiFall class folders
  fall_classes: ["FOL", "FKL", "BSC", "SDL"]
  adl_classes: ["STD", "WAL", "JOG", "JUM", "STU", "SCH", "CSI", "CSO"]
  # Sensor axes (column order in parsed files)
  sensor_columns: ["acc_x", "acc_y", "acc_z", "gyro_x", "gyro_y", "gyro_z"]

windowing:
  window_size: 128      # samples per window
  overlap: 0.5          # 50% overlap → step_size = 64

model:
  input_shape: [128, 6]
  selected_architecture: "1D-CNN"   # Options: 1D-CNN | LSTM | CNN-LSTM | Transformer
  epochs: 10
  batch_size: 64
  test_size: 0.2
  random_state: 42
  early_stopping_patience: 5
  split_method: "subject"           # Options: window | subject
  static_variance_threshold: 0.05   # Threshold for stationary phone heuristic (real walking std ~0.2, stationary ~0.02)
  # Classification threshold (0.0–1.0)
  prediction_threshold: 0.5
  labels:
    0: "Normal Activity"
    1: "FALL DETECTED"

paths:
  model_h5: "models/mobifall_model.h5"
  model_tflite_human: "models/mobifall_edge_model.tflite"
  model_tflite_car: "models/car_crash_model.tflite"
  logs_dir: "logs"
  log_file: "logs/app.log"

api:
  host: "0.0.0.0"
  port: 8000
  sensor_frequency_hz: 50

logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  max_bytes: 5242880     # 5 MB per log file
  backup_count: 3        # Keep 3 rotated backups
